name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean package

      - name: Get version from pom.xml
        id: get_version
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: target/DeltaScheduler-${{ steps.get_version.outputs.version }}.jar
          name: Release v${{ steps.get_version.outputs.version }}
          draft: false
          prerelease: false
          body: |
            ## DeltaScheduler v${{ steps.get_version.outputs.version }}
            
            This release contains the compiled plugin binary for the latest changes.
            
            ### Changelog
            * Shaded and relocated bStats metrics (using plugin ID `32072`).
            * Updated plugin version to `1.0`.
            * Repositioned and updated the logo branding.
            * Added detailed compatibility documentation in README.md.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
